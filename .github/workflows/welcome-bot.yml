name: Welcome Bot

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write
  issues: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          pr_message: |
            👋 Welcome to Tessera.io! Thank you for opening your first Pull Request!
            
            Before we can merge, please ensure:
            - The Gatekeeper CI workflow passes.
            - You've read through our `CONTRIBUTING.md`.
            
            A maintainer will review your code shortly. Happy coding!
          issue_message: |
            👋 Welcome to Tessera.io! Thank you for opening your first Issue!
            
            Please make sure you have checked out our search tools to see if a similar issue already exists. A maintainer will follow up with you shortly!
