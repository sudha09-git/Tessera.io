name: 🐛 Bug Report
description: Report a bug to help us improve Tessera.io
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the form below as completely as possible to help us reproduce and fix it quickly.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the issue...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Info
      description: OS version, Node/NPM version, Browser, etc.
      placeholder: |
        - OS: [e.g. macOS 14.2, Ubuntu 22.04]
        - Browser: [e.g. Chrome 120, Firefox 121]
        - Node Version: [e.g. v20.10.0]
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots
      description: If applicable, add error logs, console outputs, or drag-and-drop screenshots here.
      placeholder: Paste any error outputs or log traces...
    validations:
      required: false
